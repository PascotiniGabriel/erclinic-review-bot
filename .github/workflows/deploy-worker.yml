name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare-worker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Setup KV namespace
        working-directory: cloudflare-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 2703834f2ad357e5e2d67ea8a27bf7ad
        run: |
          # List existing namespaces, find PATIENTS
          KV_ID=$(wrangler kv namespace list 2>/dev/null | node -e "
            let d='';
            process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try {
                const ns=JSON.parse(d).find(n=>n.title.includes('PATIENTS'));
                if(ns) process.stdout.write(ns.id);
              } catch {}
            });
          " || echo "")

          if [ -z "$KV_ID" ]; then
            echo "Creating KV namespace..."
            RESULT=$(wrangler kv namespace create PATIENTS 2>&1)
            echo "$RESULT"
            KV_ID=$(echo "$RESULT" | grep -oP 'id = "\K[^"]+' || echo "")
          fi

          if [ -z "$KV_ID" ]; then
            echo "ERROR: Could not create or find KV namespace"
            exit 1
          fi

          echo "KV namespace ID: $KV_ID"
          sed -i "s/__KV_NAMESPACE_ID__/$KV_ID/" wrangler.toml
          cat wrangler.toml

      - name: Set Worker secrets
        working-directory: cloudflare-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 2703834f2ad357e5e2d67ea8a27bf7ad
        run: echo "${{ secrets.ERCLINIC_API_KEY }}" | wrangler secret put ERCLINIC_KEY 2>/dev/null || true

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cloudflare-worker
